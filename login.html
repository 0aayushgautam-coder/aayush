<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0095ff, #00ff44);
}

.login-container {
  width: 100%;
  max-width: 400px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
  text-align: center;
  color: white;
}

.login-container h2 {
  margin-bottom: 30px;
  font-weight: 600;
  letter-spacing: 1px;
}

.input-group {
  margin-bottom: 20px;
  text-align: left;
}

.input-group label {
  font-size: 14px;
  font-weight: 500;
}

.input-group input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  outline: none;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 8px;
  background: white;
  color: #0095ff;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  background: #f1f1f1;
}

.signup-link a{
  margin-top: 20px;
  font-size: 14px;
  text-align: center;
}

.signup-link a {
  color: #2825ef;
  font-weight: 600;
  text-decoration: none;
  transition: 0.3s ease;
}

.signup-link a:hover {
  text-decoration: underline;
  color: #2cafec;
}
</style>

</head>
<body>

<div class="login-container">
  <h2>Login</h2>

  <form id="loginForm">
    
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>
    </div>

    <button type="submit">Login</button>

    <div class="signup-link">
      Don't have an account? <a href="form.html">Register</a>
    </div>

  </form>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjiT9rd8CjmLKcKgrHz6JamT_SHOv0x3s",
  authDomain: "minor-project-c2ec9.firebaseapp.com",
  projectId: "minor-project-c2ec9",
  storageBucket: "minor-project-c2ec9.firebasestorage.app",
  messagingSenderId: "123551092488",
  appId: "1:123551092488:web:592ed0d8371491c73b26bd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginForm")
.addEventListener("submit", async (e) => {

  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "index.html";
  } catch (error) {
    alert(error.message);
  }

});

</script>

</body>
</html>
